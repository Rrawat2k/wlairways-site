<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>White Line Airways</title>
  <script>
    // GitHub Pages SPA redirect — sends all 404s back to index.html
    // preserving the path as a hash
    var path = window.location.pathname + window.location.search;
    window.location.replace(
      window.location.origin + '/#' + path.replace(/^\//, '')
    );
  </script>
</head>
<body>Redirecting...</body>
</html>
